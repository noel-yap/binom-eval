name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match `requires-python` / the classifiers in pyproject.toml.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Cache the uv download cache keyed on the lockfile.
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      # `make test` runs `uv sync` then the fast unit suite. Live evals
      # (the `live_eval` marker) need `claude` on PATH and are excluded.
      - name: Run fast unit suite
        run: make test
